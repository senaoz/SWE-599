services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: swe599
      POSTGRES_USER: swe599
      POSTGRES_PASSWORD: swe599
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swe599 -d swe599"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://swe599:swe599@db:5432/swe599
      BOUN_CSV_PATH: research/data/cleaned/boun.csv
      OLLAMA_URL: http://host.docker.internal:11434
    volumes:
      - ./research/data:/app/research/data
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
