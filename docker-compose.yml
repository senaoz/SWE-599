services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: swe599
      POSTGRES_USER: swe599
      POSTGRES_PASSWORD: swe599
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://swe599:swe599@db:5432/swe599
      BOUN_CSV_PATH: research/data/cleaned/boun.csv
    volumes:
      - ./research/data:/app/research/data
    depends_on:
      - db

volumes:
  postgres_data:
