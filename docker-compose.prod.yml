services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: swe599
      POSTGRES_USER: swe599
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swe599 -d swe599"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://swe599:${DB_PASSWORD}@db:5432/swe599
      JWT_SECRET: ${JWT_SECRET}
      BOUN_CSV_PATH: research/data/cleaned/boun.csv
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OLLAMA_CLOUD_API_KEY: ${OLLAMA_CLOUD_API_KEY}
      OLLAMA_CLOUD_MODEL: ${OLLAMA_CLOUD_MODEL:-qwen3:embedding}
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./research/data:/app/research/data
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    # GPU support: uncomment if your VPS has NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama
    entrypoint: >
      sh -c "
        ollama pull qwen3:embedding &&
        ollama pull llama3.2:3b
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
